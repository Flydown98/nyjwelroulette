<body>
<div class="nyjwel-brand" aria-label="남양주시장애인복지관 행운 마블룰렛">
  <div class="anniv" aria-hidden="true">20</div>
  <div>
    <strong>남양주시장애인복지관</strong>
    <span>선착순 선정 마블룰렛</span>
  </div>
</div>

<script type="module" src="./src/index.ts"></script>
<script type="text/javascript">
  const DEFAULT_SELECTION_COUNT = 30;
  const STORAGE_NAMES = 'mbr_names';
  const STORAGE_SELECTED = 'nyjwel_selected_names';
  const STORAGE_EXCLUDE = 'nyjwel_exclude_selected';

  let ready = false;
  let desiredSelectionCount = DEFAULT_SELECTION_COUNT;

  function $(selector) {
    return document.querySelector(selector);
  }

  function simpleToast(msg) {
    const toast = document.createElement('div');
    toast.classList.add('toast');
    toast.innerHTML = msg;
    if (window.translateElement) {
      window.translateElement(toast);
    }
    document.body.appendChild(toast);
    setTimeout(() => {
      document.body.removeChild(toast);
    }, 1600);
  }

  function parseName(nameStr) {
    const weightRegex = /(\/\d+)/;
    const countRegex = /(\*\d+)/;
    const hasWeight = weightRegex.test(nameStr);
    const hasCount = countRegex.test(nameStr);
    const nameMatch = /^\s*([^\/*]+)?/.exec(nameStr);
    const name = nameMatch && nameMatch[1] ? nameMatch[1].trim() : '';
    const weight = hasWeight ? parseInt(weightRegex.exec(nameStr)[1].replace('/', ''), 10) : 1;
    const count = hasCount ? parseInt(countRegex.exec(nameStr)[1].replace('*', ''), 10) : 1;
    return { name, weight, count };
  }

  function normalizeName(name) {
    return String(name || '').trim().replace(/\s+/g, ' ').toLowerCase();
  }

  function getOriginalNames() {
    const value = $('#in_names').value.trim();
    return value.split(/[,\r\n]/g).map(v => v.trim()).filter(v => !!v);
  }

  function getSelectedHistory() {
    try {
      const parsed = JSON.parse(localStorage.getItem(STORAGE_SELECTED) || '[]');
      return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
    } catch (e) {
      return [];
    }
  }

  function saveSelectedHistory(names) {
    const seen = new Set();
    const cleaned = [];
    names.forEach(name => {
      const displayName = String(name || '').trim();
      const key = normalizeName(displayName);
      if (!displayName || seen.has(key)) return;
      seen.add(key);
      cleaned.push(displayName);
    });
    localStorage.setItem(STORAGE_SELECTED, JSON.stringify(cleaned));
  }

  function appendSelectedHistory(names) {
    const current = getSelectedHistory();
    const currentKeys = new Set(current.map(normalizeName));
    const added = [];

    names.forEach(name => {
      const displayName = String(name || '').trim();
      const key = normalizeName(displayName);
      if (!displayName || currentKeys.has(key)) return;
      current.push(displayName);
      currentKeys.add(key);
      added.push(displayName);
    });

    saveSelectedHistory(current);
    return added;
  }

  function shouldExcludeSelected() {
    return $('#chkExcludeSelected')?.checked ?? true;
  }

  function getActiveNames() {
    const original = getOriginalNames();
    if (!shouldExcludeSelected()) return original;

    const selectedKeys = new Set(getSelectedHistory().map(normalizeName));
    return original.filter(nameStr => {
      const parsed = parseName(nameStr);
      return !selectedKeys.has(normalizeName(parsed.name));
    });
  }

  function countNameEntries(names) {
    return names.reduce((sum, nameStr) => {
      const parsed = parseName(nameStr);
      return sum + Math.max(1, Number.isFinite(parsed.count) ? parsed.count : 1);
    }, 0);
  }

  function updateSelectionState(activeCount) {
    const originalCount = countNameEntries(getOriginalNames());
    const selectedCount = getSelectedHistory().length;
    const excludedText = shouldExcludeSelected() ? `누적 선정자 ${selectedCount}명 제외 중` : `누적 선정자 ${selectedCount}명 보관 중 · 현재 제외 안 함`;
    const state = $('#selectionState');
    if (state) {
      state.textContent = `전체 ${originalCount}명 · ${excludedText} · 이번 추첨 대상 ${activeCount}명`;
    }
  }

  function setSelectionCount() {
    const total = window.roulette.getCount();
    const effectiveCount = total > 0 ? Math.min(desiredSelectionCount, total) : desiredSelectionCount;
    window.options.winningRank = Math.max(0, effectiveCount - 1);
    window.roulette.setWinningRank(window.options.winningRank);

    const hint = $('#selectionHint');
    if (hint) {
      if (total > 0) {
        hint.textContent = `이번 추첨 대상 ${total}명 중 선착순 ${effectiveCount}명 선정`;
      } else {
        hint.textContent = `추첨 대상이 없습니다. 참여자 명단 또는 제외 설정을 확인해주세요.`;
      }
    }
    updateSelectionState(total);
  }

  function getReady() {
    const originalNames = getOriginalNames();
    localStorage.setItem(STORAGE_NAMES, originalNames.join(','));

    const activeNames = getActiveNames();
    window.roulette.setMarbles(activeNames);
    ready = activeNames.length > 0 && window.roulette.getCount() > 0;
    setSelectionCount();
    return ready;
  }

  function normalizeNameInput() {
    const nameSource = getOriginalNames();
    const nameSet = new Set();
    const nameCounts = {};

    nameSource.forEach(nameSrc => {
      const parsed = parseName(nameSrc);
      if (!parsed.name) return;
      const key = parsed.weight > 1 ? `${parsed.name}/${parsed.weight}` : parsed.name;
      if (!nameSet.has(key)) {
        nameSet.add(key);
        nameCounts[key] = 0;
      }
      nameCounts[key] += Math.max(1, parsed.count);
    });

    const result = [];
    Object.keys(nameCounts).forEach(key => {
      if (nameCounts[key] > 1) {
        result.push(`${key}*${nameCounts[key]}`);
      } else {
        result.push(key);
      }
    });

    const oldValue = $('#in_names').value;
    const newValue = result.join(',');
    if (oldValue !== newValue) {
      $('#in_names').value = newValue;
    }
  }

  function copySelectedHistory() {
    const selected = getSelectedHistory();
    if (!selected.length) {
      simpleToast('복사할 누적 선정자가 없습니다');
      return;
    }

    const text = selected.map((name, index) => `${index + 1}. ${name}`).join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => simpleToast('누적 선정자 명단을 복사했습니다'));
    } else {
      simpleToast('이 브라우저에서는 자동 복사가 어렵습니다');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    initialize();
  });

  function initialize() {
    if (!window.roulette || !window.roulette.isReady) {
      setTimeout(initialize, 100);
      return;
    }

    window.options.autoRecording = false;
    window.roulette.setAutoRecording(false);

    const urlParams = new URLSearchParams(window.location.search);
    const namesFromUrl = urlParams.get('names');

    if (namesFromUrl) {
      $('#in_names').value = namesFromUrl.replace(/,/g, '\n');
    } else {
      const savedNames = localStorage.getItem(STORAGE_NAMES);
      if (savedNames) {
        $('#in_names').value = savedNames;
      }
    }

    const excludeStored = localStorage.getItem(STORAGE_EXCLUDE);
    $('#chkExcludeSelected').checked = excludeStored === null ? true : excludeStored === 'true';

    desiredSelectionCount = parseInt($('#in_winningRank').value, 10) || DEFAULT_SELECTION_COUNT;

    $('#in_names').addEventListener('input', () => {
      getReady();
    });

    $('#in_names').addEventListener('blur', () => {
      normalizeNameInput();
      getReady();
    });

    $('#in_winningRank').addEventListener('input', (e) => {
      const value = parseInt(e.target.value, 10);
      desiredSelectionCount = Number.isFinite(value) && value > 0 ? value : DEFAULT_SELECTION_COUNT;
      setSelectionCount();
    });

    $('#chkExcludeSelected').addEventListener('change', (e) => {
      localStorage.setItem(STORAGE_EXCLUDE, e.target.checked ? 'true' : 'false');
      getReady();
      simpleToast(e.target.checked ? '누적 선정자를 제외합니다' : '누적 선정자를 제외하지 않습니다');
    });

    $('#btnShuffle').addEventListener('click', () => {
      getReady();
      simpleToast('명단을 다시 준비했습니다');
    });

    $('#btnNextDraw').addEventListener('click', () => {
      $('#chkExcludeSelected').checked = true;
      localStorage.setItem(STORAGE_EXCLUDE, 'true');
      getReady();
      simpleToast('선정자를 제외하고 다음 추첨을 준비했습니다');
    });

    $('#btnResetSelected').addEventListener('click', () => {
      const ok = window.confirm('누적 선정자 기록을 모두 지울까요?\n지우면 이전 선정자도 다시 추첨 대상에 포함할 수 있습니다.');
      if (!ok) return;
      localStorage.removeItem(STORAGE_SELECTED);
      getReady();
      simpleToast('누적 선정자 기록을 초기화했습니다');
    });

    $('#btnCopySelected').addEventListener('click', () => {
      copySelectedHistory();
    });

    $('#btnStart').addEventListener('click', () => {
      getReady();
      if (!ready) {
        simpleToast('추첨 대상이 없습니다. 참여자 명단 또는 제외 설정을 확인해주세요');
        return;
      }
      window.roulette.start();
      $('#settings')?.classList.add('hide');
    });

    $('#chkAutoRecording').addEventListener('change', (e) => {
      window.options.autoRecording = e.target.matches(':checked');
      window.roulette.setAutoRecording(window.options.autoRecording);
    });

    $('#chkSkill').addEventListener('change', (e) => {
      window.options.useSkills = e.target.matches(':checked');
      window.roulette.setWinningRank(window.options.winningRank);
    });

    $('#chkDarkMode').addEventListener('change', (e) => {
      window.options.darkMode = e.target.matches(':checked');
      window.roulette.setTheme(window.options.darkMode ? 'dark' : 'light');
      document.documentElement.classList.toggle('light', !window.options.darkMode);
    });

    window.roulette.addEventListener('goal', (e) => {
      ready = false;
      const winners = Array.isArray(e.detail?.winners) ? e.detail.winners : (e.detail?.winner ? [e.detail.winner] : []);
      const added = appendSelectedHistory(winners);
      updateSelectionState(window.roulette.getCount());

      if (added.length > 0) {
        simpleToast(`${added.length}명을 누적 선정자에 저장했습니다`);
      }

      setTimeout(() => {
        $('#settings')?.classList.remove('hide');
      }, 8000);
    });

    window.roulette.addEventListener('message', (e) => {
      simpleToast(e.detail);
    });

    const toggleBtn = $('#btnToggleSettings');
    const collapsible = $('.collapsible-rows');
    toggleBtn.addEventListener('click', () => {
      collapsible.classList.toggle('collapsed');
      toggleBtn.querySelector('.toggle-arrow').textContent =
        collapsible.classList.contains('collapsed') ? '▲' : '▼';
    });

    const maps = window.roulette.getMaps();
    const mapSelector = $('#sltMap');
    maps.forEach((map) => {
      const option = document.createElement('option');
      option.value = map.index;
      option.innerHTML = map.title;
      option.setAttribute('data-trans', '');
      if (window.translateElement) window.translateElement(option);
      mapSelector.append(option);
    });
    mapSelector.addEventListener('change', (e) => {
      const index = e.target.value;
      window.roulette.setMap(index);
      getReady();
    });

    getReady();
  }
</script>

<div id="settings" class="settings">
  <div class="right">
    <button id="btnToggleSettings" class="btn-toggle-settings" type="button">
      <span>설정 접기/펼치기</span>
      <i class="toggle-arrow">▲</i>
    </button>
    <div class="collapsible-rows collapsed">
      <div class="row">
        <label for="sltMap">
          <i class="icon map"></i>
          <span>맵 선택</span>
        </label>
        <select id="sltMap"></select>
      </div>
      <div class="row row-toggles">
        <div class="toggle-item">
          <label for="chkAutoRecording">
            <i class="icon record"></i>
            <span>녹화</span>
          </label>
          <input type="checkbox" id="chkAutoRecording" />
        </div>
        <div class="toggle-item">
          <label for="chkSkill">
            <i class="icon bomb"></i>
            <span>효과 사용</span>
          </label>
          <input type="checkbox" id="chkSkill" checked />
        </div>
      </div>
      <div class="row">
        <label>
          <i class="icon trophy"></i>
          <span>선정 인원</span>
        </label>
        <div class="btn-group">
          <button class="btn-winner btn-first-winner active" type="button">First</button>
          <button class="btn-winner btn-last-winner" type="button">Last</button>
          <input type="number" id="in_winningRank" value="30" min="1" />
        </div>
      </div>
      <div class="row row-theme">
        <div class="theme">
          <i class="icon sun"></i>
          <input type="checkbox" id="chkDarkMode" checked />
          <i class="icon moon"></i>
        </div>
      </div>
    </div>
  </div>
  <div class="left">
    <h3>참여자 명단 입력</h3>
    <textarea id="in_names" placeholder="이름을 쉼표 또는 엔터로 구분해서 입력하세요">수박*2,키위*2,귤*2,나무*3,정해찬*4</textarea>
    <div id="selectionHint" class="selection-help">이번 추첨 대상 0명 중 선착순 30명 선정</div>
    <div id="selectionState" class="selection-state">전체 0명 · 누적 선정자 0명 제외 중 · 이번 추첨 대상 0명</div>
    <div class="selection-tools">
      <label for="chkExcludeSelected">
        <input type="checkbox" id="chkExcludeSelected" checked />
        이전 선정자 자동 제외
      </label>
      <button id="btnNextDraw" type="button">선정자 제외하고 다음 추첨</button>
      <button id="btnCopySelected" type="button">누적 선정자 복사</button>
      <button id="btnResetSelected" type="button">선정 기록 초기화</button>
    </div>
    <div class="actions">
      <button id="btnNotice" type="button">
        <i class="icon megaphone"></i>

      </button>
      <button id="btnStart" type="button">
        <i class="icon play"></i>
        <span>추첨 시작</span>
      </button>
    </div>
  </div>
</div>

<div id="notice"></div>
